services:
  ai-sales-coach:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: khc-ai-sales-coach
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
    # Mount .env for runtime if you want to change it without rebuild
    volumes:
      - ./.env:/app/.env:ro
